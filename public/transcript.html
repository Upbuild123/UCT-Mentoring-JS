<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transcript — Upbuild</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header></header>
  <main>
    <div class="page-header">
      <img class="brand-mark" src="/images/upbuild-logo.png" alt="Upbuild">
      <h1 style="font-size:22px">Session Transcript</h1>
      <p id="caption" class="text-gray"></p>
    </div>
    <div class="flex-row mb-16">
      <button class="btn btn-secondary btn-sm" id="download-txt">Download .txt</button>
      <a class="btn btn-secondary btn-sm" id="download-docx">Download .docx</a>
    </div>
    <hr class="divider">
    <pre id="transcript-content" style="white-space:pre-wrap;font-family:inherit"></pre>
  </main>
  <script src="/js/api.js?v=2"></script>
  <script src="/js/transcript.js?v=2"></script>
</body>
</html>
