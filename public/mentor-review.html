<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentor Review — Upbuild</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header><a href="/"><img src="/images/upbuild-logo.png" alt="Upbuild" class="logo-img"></a></header>
  <main>
    <div class="page-header">
      <h1 id="page-title">Mentor Review</h1>
      <p class="text-gray">Compare self-ratings, review reflections, and add your feedback.</p>
    </div>
    <div id="banner-area"></div>
    <div id="content" style="display:none">
      <h2 style="margin-top:0">Competency Ratings</h2>
      <div class="table-wrapper">
        <table id="ratings-table">
          <thead>
            <tr><th>Competency</th><th>Coach's Rating</th><th>Your Rating</th></tr>
          </thead>
          <tbody id="ratings-body"></tbody>
        </table>
      </div>

      <h2>Coach's Reflections</h2>
      <div id="coach-reflections"></div>

      <hr class="divider">
      <h2 style="margin-top:0">Your Feedback</h2>
      <div id="mentor-feedback-fields"></div>

      <div class="flex-row">
        <button class="btn btn-primary" id="submit-btn">Submit Feedback</button>
        <button class="btn btn-secondary" id="save-draft-btn">Save Draft</button>
        <span id="draft-saved" style="display:none;color:var(--gray);font-size:13px">Draft saved</span>
      </div>
      <div id="submit-success" class="alert alert-success mt-16" style="display:none"></div>
    </div>
  </main>
  <script src="/js/api.js?v=2"></script>
  <script src="/js/mentor-review.js?v=2"></script>
</body>
</html>
