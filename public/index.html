<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Recording — Upbuild</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header></header>
  <main>
    <div class="page-header">
      <img class="brand-mark" src="/images/upbuild-logo.png" alt="Upbuild">
      <h1>Submit Your Coaching Recording</h1>
      <p class="text-gray">Share your session recording and self-assessment with your mentor.</p>
    </div>

    <div id="banner-area"></div>

    <div class="card">
      <div class="form-group">
        <label for="student-select">Your Name</label>
        <select id="student-select"><option value="">Select your name</option></select>
      </div>

      <div class="form-group">
        <label>Round</label>
        <div class="radio-row">
          <label><input type="radio" name="round" value="1"> Round 1</label>
          <label><input type="radio" name="round" value="2"> Round 2</label>
          <label><input type="radio" name="round" value="3"> Round 3</label>
          <label><input type="radio" name="round" value="4"> Round 4</label>
        </div>
      </div>

      <div id="duplicate-warning" class="alert alert-warning" style="display:none">
        <strong>You already submitted this round.</strong> Submitting again will replace your first entry.
        <div class="checkbox-row mt-16"><label><input type="checkbox" id="duplicate-confirm"> I understand, replace my previous submission</label></div>
      </div>

      <div class="form-group" style="margin-bottom:0">
        <label for="video-file">Coaching Session Recording</label>
        <input type="file" id="video-file" accept=".mp4,.mov,.webm,.avi">
        <div id="file-size" class="text-gray mt-16"></div>
      </div>
    </div>

    <h2>Meta-Skills Self-Rating</h2>
    <div class="card" id="meta-skills-ratings"></div>

    <h2>Skills Self-Rating</h2>
    <div class="card" id="skills-ratings"></div>

    <h2>Reflections</h2>
    <div class="card" id="reflection-questions"></div>

    <div id="progress-area" style="display:none">
      <div class="alert alert-warning" id="progress-msg">Processing your submission…
        <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-bar-fill" style="width:0%"></div></div>
      </div>
    </div>

    <div id="success-area" style="display:none" class="alert alert-success"></div>
    <div id="submit-error-area"></div>

    <button class="btn btn-primary" id="submit-btn" style="margin-top:8px;width:100%">Submit Recording</button>
  </main>

  <script src="/js/api.js?v=2"></script>
  <script src="/js/submission.js?v=2"></script>
</body>
</html>
